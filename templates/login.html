<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Courier System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { DEFAULT: '#6366f1', hover: '#4f46e5' },
                        dark: { 900: '#0f1115', 800: '#161920', 700: '#1f242d' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f1115; color: #f3f4f6; }
        .glass-panel {
            background: linear-gradient(145deg, rgba(31, 36, 45, 0.7) 0%, rgba(22, 25, 32, 0.9) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
        }
        .input-glow {
            background: rgba(15, 17, 21, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-glow:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Animated background effects -->
    <div class="absolute inset-0 bg-grid pointer-events-none"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/20 rounded-full blur-[120px] pointer-events-none mix-blend-screen"></div>

    <div class="w-full max-w-sm px-6 relative z-10">
        <div class="glass-panel rounded-2xl p-8 transform transition-all hover:scale-[1.01] duration-300">
            
            <div class="text-center mb-8">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 mx-auto flex items-center justify-center shadow-[0_0_20px_rgba(99,102,241,0.5)] mb-4">
                    <i class="fa-solid fa-bolt text-white text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-white tracking-tight">Welcome Back</h1>
                <p class="text-sm text-gray-400 mt-1">Sign in to your dashboard</p>
            </div>

            {% if error %}
            <div class="mb-5 bg-red-500/10 border border-red-500/30 rounded-lg p-3 flex items-start animate-fade-in-up">
                <i class="fa-solid fa-triangle-exclamation text-red-400 mt-0.5 mr-2"></i>
                <span class="text-sm text-red-200 font-medium">{{ error }}</span>
            </div>
            {% endif %}

            <form method="post" class="space-y-5">
                <div>
                    <label class="block text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-2">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="fa-solid fa-user text-gray-500 text-sm"></i>
                        </div>
                        <input type="text" name="username" class="input-glow w-full rounded-lg pl-10 pr-4 py-2.5 text-sm text-white focus:ring-0 placeholder-gray-600" placeholder="Enter username" required autofocus>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <label class="block text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Password</label>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-gray-500 text-sm"></i>
                        </div>
                        <input type="password" name="password" class="input-glow w-full rounded-lg pl-10 pr-4 py-2.5 text-sm text-white focus:ring-0 placeholder-gray-600" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-primary hover:from-indigo-400 hover:to-indigo-500 text-white font-medium py-2.5 rounded-lg shadow-[0_0_15px_rgba(99,102,241,0.4)] hover:shadow-[0_0_25px_rgba(99,102,241,0.6)] transition-all duration-300 transform hover:-translate-y-0.5 active:translate-y-0 text-sm tracking-wide flex items-center justify-center group">
                        <span>Sign In</span>
                        <i class="fa-solid fa-arrow-right ml-2 opacity-70 group-hover:transform group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>
            </form>
            
        </div>
        
        <p class="text-center text-xs text-gray-600 mt-6 font-medium tracking-wide">
            &copy; 2026 Onyx Systems Inc.
        </p>
    </div>

</body>
</html>
